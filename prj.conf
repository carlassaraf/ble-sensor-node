# C++ support
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# Log settings
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_I2C=y
CONFIG_AHT10=y

# Bluetooth settings
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Zephyr Sensor Node"
CONFIG_BT_SMP=y
CONFIG_BT_MAX_PAIRED=1

# Display
CONFIG_DISPLAY=y
# MIPI_DBI is auto-enabled by the driver; suppress NCS's WARN_EXPERIMENTAL to avoid build abort
CONFIG_WARN_EXPERIMENTAL=n

# LVGL
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=65536
CONFIG_LV_Z_VDB_SIZE=10
CONFIG_LV_COLOR_DEPTH_16=y